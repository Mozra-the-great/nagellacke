name: CI

on:
  push:
    branches: [main]
    paths:
      - 'v3/**'
  pull_request:
    branches: [main]
    paths:
      - 'v3/**'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate lockfile for Linux (manual trigger only)
        # package-lock.json only carried Windows-platform entries for native
        # optional deps (@rollup/rollup-*, @rolldown/binding-*) — plain
        # `npm install` against the existing lock doesn't add the missing
        # linux-x64-gnu entries on its own. Force a full fresh resolution.
        if: github.event_name == 'workflow_dispatch'
        run: rm -f package-lock.json && rm -rf node_modules

      - name: Install
        run: npm install

      - name: Build core
        run: npm run build:core

      - name: Build sync
        run: npm run build:sync

      - name: Build server
        run: npm run build:server

      - name: Build web
        run: npm run build:web

      - name: Test (core)
        run: npm run test

      - name: Upload package-lock.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-lock
          path: v3/package-lock.json
