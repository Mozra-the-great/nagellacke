name: CI

on:
  push:
    branches: [main]
    paths:
      - 'v3/**'
  pull_request:
    branches: [main]
    paths:
      - 'v3/**'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Regenerate lockfile for Linux (manual trigger only)
        # package-lock.json only carried Windows-platform entries for native
        # optional deps (@rollup/rollup-*, @rolldown/binding-*) — plain
        # `npm install` against the existing lock doesn't add the missing
        # linux-x64-gnu entries on its own. Force a full fresh resolution.
        if: github.event_name == 'workflow_dispatch'
        run: rm -f package-lock.json && rm -rf node_modules

      - name: Install
        run: npm install

      - name: Build core
        run: npm run build:core

      - name: Build sync
        run: npm run build:sync

      - name: Build server
        run: npm run build:server

      - name: Build web
        run: npm run build:web

      - name: Test (core)
        run: npm run test

      - name: Upload package-lock.json
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: package-lock
          path: v3/package-lock.json
